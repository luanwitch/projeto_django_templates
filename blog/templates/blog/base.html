<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meu Blog{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        header { background-color: #f2f2f2; padding: 20px; text-align: center; }
        footer { background-color: #f2f2f2; padding: 20px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Meu Blog em Django</h1>
    </header>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; 2025 - Todos os direitos reservados.</p>
    </footer>
</body>
</html>
